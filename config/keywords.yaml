# ============================================================
# arXiv paper filtering settings
# Edit only this file to add or remove keywords.
# ============================================================

# Target arXiv categories
categories:
  - cs.SD
  - eess.AS

# Filtering keywords (OR condition)
# Include papers whose title or abstract contains any of these terms.
include:
  # Audio foundation models
  - audio foundation model
  - audio language model
  - audio large language model
  - sound foundation model
  - music foundation model
  - audio pre-training
  - audio self-supervised
  - universal audio
  # Source separation
  - source separation
  - music separation
  - speech separation
  - sound separation
  - speaker separation
  - vocal separation
  - music demixing
  # Anomalous sound detection
  - anomalous sound detection
  - anomaly sound detection
  - anomaly detection
  - acoustic anomaly
  - machine sound anomaly
  - unsupervised anomaly
  - sound event detection

# Exclusion keywords override include matches.
exclude:
  - survey only
  - retracted

# Category definitions displayed in the UI
ui_categories:
  - id: foundation
    label: 音の基盤モデル
    labelEn: Audio Foundation Models
    color: "#38bdf8"
    keywords:
      - audio foundation model
      - audio language model
      - audio large language model
      - sound foundation model
      - music foundation model
      - audio pre-training
      - audio self-supervised
      - universal audio

  - id: separation
    label: 音源分離
    labelEn: Source Separation
    color: "#4ade80"
    keywords:
      - source separation
      - music separation
      - speech separation
      - sound separation
      - speaker separation
      - vocal separation
      - music demixing

  - id: anomaly
    label: 異音検知
    labelEn: Anomalous Sound Detection
    color: "#fb923c"
    keywords:
      - anomalous sound detection
      - anomaly sound detection
      - anomaly detection
      - acoustic anomaly
      - machine sound anomaly
      - unsupervised anomaly
      - sound event detection
