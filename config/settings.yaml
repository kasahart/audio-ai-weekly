# ============================================================
# System settings
# ============================================================

# arXiv retrieval settings
arxiv:
  lookback_days: 7          # Retrieval window in days
  max_papers: 50            # Maximum papers after filtering
  catchup_max_days: 28      # Maximum automatic catch-up window; fail if exceeded
  catchup_max_papers: 200   # Maximum papers during automatic catch-up
  request_interval: 3.0     # Interval between API requests in seconds
  request_timeout: 30       # API request timeout in seconds
  retry_max: 3              # Maximum API attempts
  retry_interval: 5.0       # Initial retry interval in seconds
  user_agent: "arxiv-weekly-report/1.0 (github.com/kasahart/arxiv-weekly)"
  page_size: 100             # Papers requested per arXiv API page
  max_authors: 5             # Authors retained in published data
  max_affiliation_length: 60
  retryable_http_statuses: [429, 500, 502, 503, 504]

# External metadata API settings
metadata:
  user_agent: "arxiv-weekly/1.0"
  request_timeout: 10
  arxiv_request_timeout: 15
  paper_interval: 0.5
  huggingface_interval: 0.3

# Analysis and report-generation settings
analysis:
  prompt_authors: 3
  temperature: 0.3
  enrichment_tokens_per_paper: 800
  trend_paper_limit: 20
  trend_line_count: 3
  trend_temperature: 0.4
  connection_max_tokens: 500

# Historical backfill settings
backfill:
  weekday: 4                 # Monday=0, Friday=4
  interval_days: 7
  week_interval: 90.0

# AI provider selection
ai:
  provider: "gemini"  # "github_models" or "gemini"

# GitHub Models settings
github_models:
  api_key_env: "GITHUB_TOKEN"
  endpoint: "https://models.github.ai/inference"
  model: "gpt-4o"
  max_tokens: 1500
  batch_size: 5
  batch_max_tokens: 6000
  min_request_interval: 60.0
  retry_max: 3
  retry_interval: 5.0       # Retry interval in seconds

# Gemini settings (OpenAI-compatible API)
gemini:
  api_key_env: "GEMINI_API_KEY"
  endpoint: "https://generativelanguage.googleapis.com/v1beta/openai/"
  model: "gemini-3.5-flash"
  max_tokens: 16000
  batch_size: 5
  batch_max_tokens: 32000
  min_request_interval: 60.0
  retry_max: 3
  retry_interval: 5.0       # Retry interval in seconds

# Data output settings
data:
  weekly_dir: "data/weekly"
  index_file: "data/index.json"
