# ============================================================
# システム設定ファイル
# ============================================================

# arXiv 取得設定
arxiv:
  lookback_days: 7          # 取得対象期間（日数）
  max_papers: 50            # フィルタ後の最大取得件数
  catchup_max_days: 28      # 自動遡及の最大日数（超過時は停止）
  catchup_max_papers: 200   # 自動遡及時の最大取得件数
  request_interval: 3.0     # API リクエスト間隔（秒）
  request_timeout: 30       # API リクエストタイムアウト（秒）
  retry_max: 3              # API リトライ回数
  retry_interval: 5.0       # API リトライ間隔（秒）
  user_agent: "arxiv-weekly-report/1.0 (github.com/kasahart/arxiv-weekly)"

# GitHub Models 設定
github_models:
  endpoint: "https://models.inference.ai.azure.com"
  model: "openai/gpt-5"
  max_tokens: 1500
  batch_size: 5
  batch_max_tokens: 6000
  min_request_interval: 60.0
  retry_max: 3
  retry_interval: 5.0       # リトライ間隔（秒）

# データ出力設定
data:
  weekly_dir: "data/weekly"
  index_file: "data/index.json"
  latest_file: "data/latest.json"
