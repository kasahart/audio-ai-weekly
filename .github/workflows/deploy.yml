name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - web/**
      - .github/workflows/deploy.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  queue: max
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Restore published data
        run: |
          git fetch origin gh-pages
          mkdir -p web/public/data/weekly
          for file in $(git ls-tree -r --name-only origin/gh-pages | grep '^data/.*\.json$'); do
            mkdir -p "web/public/$(dirname "$file")"
            git show "origin/gh-pages:$file" > "web/public/$file"
          done

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm test -- --run
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web/dist
          publish_branch: gh-pages
          commit_message: 'deploy: frontend'
