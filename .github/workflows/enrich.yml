name: Enrich Weekly Data

on:
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      pages: write
      id-token: write
      models: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch existing weekly data from gh-pages
        run: |
          git fetch origin gh-pages
          mkdir -p data/weekly
          for f in $(git ls-tree -r --name-only origin/gh-pages 2>/dev/null | grep '^data/weekly/.*\.json$'); do
            git show origin/gh-pages:$f > $f 2>/dev/null || true
          done
          git show origin/gh-pages:data/index.json > data/index.json 2>/dev/null || true
          echo "Weekly files:"
          ls data/weekly/

      - name: Enrich weekly data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/enrich_data.py

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Fetch existing data from gh-pages for merge
        run: |
          mkdir -p web/public/data/weekly
          for f in $(git ls-tree -r --name-only origin/gh-pages 2>/dev/null | grep '^data/weekly/.*\.json$'); do
            git show origin/gh-pages:$f > web/public/$f 2>/dev/null || true
          done

      - name: Copy enriched data to web/public
        run: |
          find data/weekly -name '*.json' -exec cp {} web/public/data/weekly/ \;
          cp data/index.json web/public/data/

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web/dist
          publish_branch: gh-pages
          commit_message: "deploy: enrich all weekly data with full metadata"
