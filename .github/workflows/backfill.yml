name: Backfill Historical Data

on:
  workflow_dispatch:
    inputs:
      from_date:
        description: 'Start date YYYY-MM-DD (includes Fridays on or after this date)'
        required: true
        default: '2026-01-01'
      to_date:
        description: 'End date YYYY-MM-DD (default: today)'
        required: false
        default: ''

permissions:
  contents: write
  models: read

concurrency:
  group: github-pages
  queue: max
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      models: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore published JSON from gh-pages
        run: |
          git fetch --no-tags origin gh-pages
          PUBLISHED_REF=$(git rev-parse --verify origin/gh-pages)
          git cat-file -e "${PUBLISHED_REF}:data/index.json"

          mapfile -t JSON_FILES < <(git ls-tree -r --name-only "$PUBLISHED_REF" -- data | grep '\.json$')
          if [ "${#JSON_FILES[@]}" -eq 0 ]; then
            echo "::error::No published JSON files found on gh-pages"
            exit 1
          fi

          WEEKLY_COUNT=0
          for file in "${JSON_FILES[@]}"; do
            case "$file" in
              data/index.json|data/weekly/*.json|data/features/*.json)
                mkdir -p "$(dirname "$file")"
                tmp="${file}.published-tmp"
                git show "${PUBLISHED_REF}:${file}" > "$tmp"
                python -m json.tool "$tmp" > /dev/null
                mv "$tmp" "$file"
                case "$file" in data/weekly/*.json) WEEKLY_COUNT=$((WEEKLY_COUNT + 1));; esac
                ;;
            esac
          done

          if [ "$WEEKLY_COUNT" -eq 0 ]; then
            echo "::error::No published weekly JSON files found on gh-pages"
            exit 1
          fi
          cp data/index.json /tmp/existing_index.json

      - name: Backfill weekly data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FROM_DATE: ${{ inputs.from_date }}
          TO_DATE: ${{ inputs.to_date }}
        run: |
          ARGS=(--from-date "$FROM_DATE")
          if [ -n "$TO_DATE" ]; then
            ARGS+=(--to-date "$TO_DATE")
          fi
          python scripts/backfill.py "${ARGS[@]}"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Merge weekly index
        run: |
          python3 - << 'EOF'
          import json
          existing = json.load(open('/tmp/existing_index.json'))
          new_idx_path = 'data/index.json'
          import os
          if os.path.exists(new_idx_path):
              new = json.load(open(new_idx_path))
          else:
              new = {"weeks": []}
          merged = {w['date']: w for w in existing.get('weeks', [])}
          for w in new.get('weeks', []):
              merged[w['date']] = w
          existing['weeks'] = sorted(merged.values(), key=lambda x: x['date'], reverse=True)
          existing['generated_at'] = new.get('generated_at', existing.get('generated_at', ''))
          existing['categories'] = new.get('categories', existing.get('categories', []))
          json.dump(existing, open('data/index.json', 'w'), ensure_ascii=False, indent=2)
          print(f"[deploy] Merged index: {len(existing['weeks'])} weeks")
          EOF

      - name: Copy published JSON
        run: |
          mkdir -p web/public/data/weekly web/public/data/features
          install -m 0644 data/index.json web/public/data/index.json
          find data/weekly -maxdepth 1 -type f -name '*.json' -exec cp {} web/public/data/weekly/ \;
          if [ -d data/features ]; then
            find data/features -maxdepth 1 -type f -name '*.json' -exec cp {} web/public/data/features/ \;
          fi

      - name: Render static feature pages
        run: python scripts/render_features.py

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm test -- --run
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web/dist
          publish_branch: gh-pages
          commit_message: "deploy: backfill ${{ github.event.inputs.from_date }} to ${{ github.event.inputs.to_date }}"
